<body class="auth-page">
    <div class="container-fluid p-0">
        <div id="auth-section" class="card admin-login-card shadow-lg">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4 text-accent">Login Admin</h2>
                <div class="mb-3">
                    <label for="admin-email" class="form-label auth-form-label">Alamat Email</label>
                    <input type="email" class="form-control auth-input" id="admin-email" placeholder="admin@example.com"
                        required>
                </div>
                <div class="mb-4">
                    <label for="admin-password" class="form-label auth-form-label">Kata Sandi</label>
                    <input type="password" class="form-control auth-input" id="admin-password" required>
                </div>
                <button id="admin-login-btn" class="btn btn-primary w-100 auth-btn">Masuk ke Dashboard</button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
