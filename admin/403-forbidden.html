<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Akses Ditolak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/admin/themes.css">
    <link rel="stylesheet" href="/src/admin/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--vscode-bg);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }
        .forbidden-card {
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 3rem;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }
        .text-accent-gradient {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .btn-premium {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.3);
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(58, 123, 213, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="forbidden-card">
        <div class="icon-wrapper">
            <i class="bi bi-shield-slash"></i>
        </div>
        <h1 class="display-5 fw-bold mb-3">403</h1>
        <h3 class="mb-4 text-accent-gradient">Akses Ditolak</h3>
        <p class="text-white-50 mb-5">
            Maaf, Anda tidak memiliki izin untuk mengakses modul ini. Silakan hubungi Administrator jika Anda merasa ini adalah kesalahan.
        </p>
        <a href="/admin/" class="btn btn-premium btn-lg text-white">
            <i class="bi bi-house-door me-2"></i> Kembali ke Dashboard
        </a>
    </div>
</body>
</html>
