<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Pelanggan</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('app-theme');
        if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .bg-vscode {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
        }

        .text-accent {
            color: #58a6ff;
        }

        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .step-item.active .step-number {
            background: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
        }

        .step-item.completed .step-number {
            background: #238636;
            color: #fff;
            border-color: #238636;
        }

        .card {
            border: 1px solid #30363d;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .scroll-list {
            height: calc(100vh - 120px);
            overflow-y: auto;
        }

        @media (max-width: 991.98px) {
            .scroll-list {
                height: auto;
                max-height: 400px;
            }
        }

        /* Photo Upload Area */
        .photo-drop-zone {
            border: 2px dashed #30363d;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .photo-drop-zone:hover {
            border-color: #58a6ff;
            background-color: rgba(88, 166, 255, 0.05);
        }

        #photo-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-thumb {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .photo-thumb .remove-photo {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #da3633;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* GPS button on map */
        .leaflet-gps-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
    </style>

<body>
    <div class="container-fluid p-3 p-md-4">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <!-- <div class="d-flex align-items-center">
                <h4 class="mb-0 fw-bold"><i class="bi bi-person-plus-fill text-accent me-2"></i>Registrasi Pelanggan
                </h4>
            </div> -->
            <div class="small text-white-50 d-none d-md-block" id="current-time"></div>
        </header>

        <div class="row g-4 justify-content-center">
            <div class="col-lg-10">
                <div id="psb-form-container">
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple time updater
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString('id-ID', { dateStyle: 'long', timeStyle: 'medium' });
        }, 1000);
    </script>
