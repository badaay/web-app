<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Pelanggan - Portal Admin</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .bg-vscode {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
        }

        .text-accent {
            color: #58a6ff;
        }

        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .step-item.active .step-number {
            background: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
        }

        .step-item.completed .step-number {
            background: #238636;
            color: #fff;
            border-color: #238636;
        }

        .card {
            border: 1px solid #30363d;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .scroll-list {
            height: calc(100vh - 120px);
            overflow-y: auto;
        }

        @media (max-width: 991.98px) {
            .scroll-list {
                height: auto;
                max-height: 400px;
            }
        }

        /* Photo Upload Area */
        .photo-drop-zone {
            border: 2px dashed #30363d;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .photo-drop-zone:hover {
            border-color: #58a6ff;
            background-color: rgba(88, 166, 255, 0.05);
        }

        #photo-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-thumb {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .photo-thumb .remove-photo {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #da3633;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* GPS button on map */
        .leaflet-gps-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
    </style>
  <script type="module" crossorigin src="/web-app/assets/add-psb-DjQJxPKm.js"></script>
  <link rel="modulepreload" crossorigin href="/web-app/assets/supabase-DlQAt1xf.js">
  <link rel="stylesheet" crossorigin href="/web-app/assets/supabase-Ck-cEz_8.css">
  <link rel="stylesheet" crossorigin href="/web-app/assets/admin-uD1hFd_Y.css">
<link rel="manifest" href="/web-app/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/web-app/registerSW.js"></script></head>

<body>
    <div class="container-fluid p-3 p-md-4">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <a href="/admin" class="btn btn-outline-light btn-sm me-3 border-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Kembali
                </a>
                <h4 class="mb-0 fw-bold"><i class="bi bi-person-plus-fill text-accent me-2"></i>Registrasi Pelanggan
                </h4>
            </div>
            <div class="small text-white-50 d-none d-md-block" id="current-time"></div>
        </header>

        <div class="row g-4 h-100">
            <!-- Side Kiri: Register Form -->
            <div class="col-lg-5 h-100">
                <div class="card bg-vscode p-4 h-100">
                    <div class="d-flex mb-4">
                        <div class="step-item active d-flex align-items-center me-4" id="step-1-indicator">
                            <div class="step-number">1</div>
                            <span class="small fw-bold">Pelanggan</span>
                        </div>
                        <div class="step-item d-flex align-items-center" id="step-2-indicator">
                            <div class="step-number">2</div>
                            <span class="small fw-bold">Data Antrian</span>
                        </div>
                    </div>

                    <div id="psb-form-container">
                        <!-- Step 1: Customer Selection or Creation -->
                        <div id="step-1-content">
                            <h5 class="mb-3">Langkah 1: Identifikasi Pelanggan</h5>

                            <div class="mb-4">
                                <label class="form-label small text-white-50">Cari Pelanggan Terdaftar</label>
                                <div class="input-group mb-2">
                                    <span class="input-group-text bg-dark border-secondary text-white-50"><i
                                            class="bi bi-search"></i></span>
                                    <input type="text" id="customer-search" class="form-control"
                                        placeholder="Cari Nama/HP/KTP...">
                                </div>
                                <div id="search-results" class="list-group mb-2"
                                    style="max-height: 150px; overflow-y: auto;">
                                    <!-- Results will be injected -->
                                </div>
                                <div id="selected-customer-badge" class="alert alert-primary d-none py-2 mb-0">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span><i class="bi bi-person-check-fill me-2"></i> <span
                                                id="selected-cust-name"></span></span>
                                        <button type="button" class="btn-close btn-close-white" id="btn-clear-selection"
                                            style="font-size: 0.6rem;"></button>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex align-items-center mb-3">
                                <hr class="flex-grow-1 border-secondary opacity-25">
                                <span class="mx-3 small text-white-50">ATAU</span>
                                <hr class="flex-grow-1 border-secondary opacity-25">
                            </div>

                            <button class="btn btn-outline-accent w-100 mb-3" id="btn-show-new-form">
                                <i class="bi bi-person-plus me-2"></i>Daftarkan Pelanggan Baru
                            </button>

                            <div id="new-customer-form"
                                class="d-none animate__animated animate__fadeIn border border-secondary border-opacity-25 p-3 rounded bg-dark bg-opacity-25 mb-3">
                                <h6 class="mb-3 text-accent small text-uppercase" style="letter-spacing: 1px;">Data
                                    Pelanggan Baru</h6>
                                <div class="mb-3">
                                    <label class="form-label small text-white-50">Nama Lengkap (Wajib)</label>
                                    <input type="text" id="new-cust-name" class="form-control form-control-sm">
                                </div>
                                <div class="row">
                                    <div class="col-6 mb-3">
                                        <label class="form-label small text-white-50">No. HP (Wajib)</label>
                                        <input type="text" id="new-cust-phone" class="form-control form-control-sm">
                                    </div>
                                    <div class="col-6 mb-3">
                                        <label class="form-label small text-white-50">KTP (Opsional)</label>
                                        <input type="text" id="new-cust-ktp" class="form-control form-control-sm">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small text-white-50">Alamat Pemasangan</label>
                                    <textarea id="new-cust-address" class="form-control form-control-sm"
                                        rows="2"></textarea>
                                </div>

                                <!-- Location Picker Map with GPS button -->
                                <div class="mb-3">
                                    <label class="form-label small text-white-50">Lokasi Pemasangan</label>
                                    <div class="position-relative mb-2">
                                        <div id="psb-map" class="rounded border border-secondary"
                                            style="height: 200px; background: #1e1e1e; z-index: 1;"></div>
                                        <button type="button" id="btn-get-location"
                                            class="btn btn-sm btn-dark border-secondary leaflet-gps-btn"
                                            title="Gunakan Lokasi GPS Saya">
                                            <i class="bi bi-geo-alt-fill text-accent me-1"></i> Lokasi Saya
                                        </button>
                                    </div>
                                    <div class="row g-2">
                                        <div class="col">
                                            <input type="number" step="any" id="new-cust-lat"
                                                class="form-control form-control-sm bg-dark text-white border-secondary"
                                                placeholder="Latitude" readonly>
                                        </div>
                                        <div class="col">
                                            <input type="number" step="any" id="new-cust-lng"
                                                class="form-control form-control-sm bg-dark text-white border-secondary"
                                                placeholder="Longitude" readonly>
                                        </div>
                                    </div>
                                    <small class="text-white-50 mt-1 d-block">
                                        <i class="bi bi-info-circle me-1"></i>Klik peta untuk pin lokasi, atau tekan
                                        <strong>"Lokasi Saya"</strong> untuk GPS otomatis.
                                    </small>
                                </div>

                                <!-- Photo Capture / Upload Section -->
                                <div class="mb-3">
                                    <label class="form-label small text-white-50">Foto Rumah / Lokasi (Opsional)</label>
                                    <div class="photo-drop-zone" id="photo-drop-zone">
                                        <i class="bi bi-image fs-4 text-white-50 d-block mb-1"></i>
                                        <span class="small text-white-50">Lampirkan foto atau gunakan kamera</span>
                                    </div>
                                    <!-- Hidden file inputs -->
                                    <input type="file" id="photo-file-input" accept="image/*" multiple class="d-none">
                                    <input type="file" id="photo-camera-input" accept="image/*" capture="environment"
                                        class="d-none">
                                    <!-- Action buttons -->
                                    <div class="d-flex gap-2 mt-2">
                                        <button type="button" class="btn btn-outline-secondary btn-sm flex-fill"
                                            id="btn-attach-photo">
                                            <i class="bi bi-paperclip me-1"></i> Lampirkan File
                                        </button>
                                        <button type="button" class="btn btn-outline-info btn-sm flex-fill"
                                            id="btn-open-camera">
                                            <i class="bi bi-camera me-1"></i> Buka Kamera
                                        </button>
                                    </div>
                                    <!-- Thumbnail Previews -->
                                    <div id="photo-preview-container"></div>
                                </div>

                                <button class="btn btn-primary btn-sm w-100" id="btn-create-customer-only">
                                    <i class="bi bi-check-lg me-1"></i> Simpan Pelanggan & Lanjut
                                </button>
                            </div>

                            <div class="d-flex justify-content-end mt-4" id="step-1-nav">
                                <button class="btn btn-primary px-4" id="btn-next-step" disabled>
                                    Lanjut ke Data Antrian <i class="bi bi-arrow-right ms-2"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Step 2: PSB Details -->
                        <div id="step-2-content" class="d-none">
                            <h5 class="mb-3">Rincian Pemasangan Baru</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Tanggal Daftar</label>
                                    <input type="date" id="psb-reg-date" class="form-control" value="">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Paket Layanan</label>
                                    <select id="psb-package" class="form-select">
                                        <option value="">Pilih Paket...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-white-50">Nama Referal</label>
                                <input type="text" id="psb-referral" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-white-50">Keterangan Singkat</label>
                                <input type="text" id="psb-ket" class="form-control" placeholder="Data OK, Urgent, dsb">
                            </div>

                            <div class="d-flex justify-content-between mt-5">
                                <button class="btn btn-link text-white-50 p-0 text-decoration-none" id="btn-prev-step">
                                    <i class="bi bi-arrow-left me-2"></i> Kembali
                                </button>
                                <button class="btn btn-success px-5" id="btn-submit-psb">
                                    Simpan & Tambah Ke Antrian <i class="bi bi-check-circle ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Side Kanan: Antrian List -->
            <div class="col-lg-7 h-100">
                <div class="card bg-vscode h-100 overflow-hidden">
                    <div
                        class="card-header border-bottom border-secondary p-3 d-flex justify-content-between align-items-center bg-dark bg-opacity-50">
                        <h6 class="mb-0 fw-bold text-success"><i class="bi bi-clock-history me-2"></i>Antrian Terkini
                            (Hari Ini)</h6>
                        <span class="badge bg-success rounded-pill" id="today-count">0</span>
                    </div>
                    <div class="scroll-list p-3" id="recent-queue-list">
                        <!-- Queue list will be injected -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple time updater
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString('id-ID', { dateStyle: 'long', timeStyle: 'medium' });
        }, 1000);
    </script>
</body>

</html>
