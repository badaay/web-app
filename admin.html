<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.css">
    <meta name="theme-color" content="#ffffff">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .admin-login-card {
            max-width: 400px;
            margin: 100px auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="auth-section" class="card admin-login-card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">Admin Login</h2>
                <div class="mb-3">
                    <label for="admin-email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="admin-email" placeholder="admin@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="admin-password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="admin-password" required>
                </div>
                <button id="admin-login-btn" class="btn btn-primary w-100">Login to Dashboard</button>
            </div>
        </div>

        <div id="dashboard-section" style="display: none;" class="mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2">Admin Dashboard</h1>
                <button id="logout-btn" class="btn btn-outline-danger">Sign Out</button>
            </div>

            <div id="user-info" class="alert alert-info shadow-sm mb-4"></div>

            <div id="role-feature">
                <!-- Role-specific content will go here -->
            </div>

            <ul class="nav nav-tabs mt-4" id="masterDataTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="technicians-tab" data-bs-toggle="tab"
                        data-bs-target="#technicians-content" type="button" role="tab">Technicians</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="customers-tab" data-bs-toggle="tab" data-bs-target="#customers-content"
                        type="button" role="tab">Customers</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="inventory-tab" data-bs-toggle="tab" data-bs-target="#inventory-content"
                        type="button" role="tab">Inventory</button>
                </li>
            </ul>
            <div class="tab-content border-start border-end border-bottom p-4 bg-white rounded-bottom"
                id="masterDataTabsContent">
                <div class="tab-pane fade show active" id="technicians-content" role="tabpanel">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3>Technicians</h3>
                        <button class="btn btn-sm btn-success" id="add-tech-btn">+ Add Technician</button>
                    </div>
                    <div id="technicians-list">Loading...</div>
                </div>
                <div class="tab-pane fade" id="customers-content" role="tabpanel">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3>Customers</h3>
                        <button class="btn btn-sm btn-success" id="add-customer-btn">+ Add Customer</button>
                    </div>
                    <div id="customers-list">Loading...</div>
                </div>
                <div class="tab-pane fade" id="inventory-content" role="tabpanel">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3>Inventory</h3>
                        <button class="btn btn-sm btn-success" id="add-inventory-btn">+ Add Item</button>
                    </div>
                    <div id="inventory-list">Loading...</div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal for CRUD operations (Shared) -->
    <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="crudModalTitle">Add/Edit Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="crudModalBody">
                    <!-- Dynamic Form Content -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-crud-btn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Map -->
    <div class="modal fade" id="mapModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Location Map</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="admin-map" style="height: 400px; width: 100%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/admin/admin.js"></script>
</body>

</html>
