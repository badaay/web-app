<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="theme-color" content="#ffffff">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .admin-login-card {
            max-width: 400px;
            margin: 100px auto;
        }

        #dashboard-section {
            padding-top: 80px;
        }

        .navbar-nav .nav-link.active {
            font-weight: bold;
            color: var(--bs-primary) !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="auth-section" class="card admin-login-card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">Login Admin</h2>
                <div class="mb-3">
                    <label for="admin-email" class="form-label">Alamat Email</label>
                    <input type="email" class="form-control" id="admin-email" placeholder="admin@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="admin-password" class="form-label">Kata Sandi</label>
                    <input type="password" class="form-control" id="admin-password" required>
                </div>
                <button id="admin-login-btn" class="btn btn-primary w-100">Masuk ke Dashboard</button>
            </div>
        </div>

        <div id="dashboard-section" style="display: none;">
            <!-- Sticky Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top shadow-sm">
                <div class="container">
                    <a class="navbar-brand fw-bold text-primary" href="#">Portal Admin</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#adminNavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="adminNavbar">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" href="#" id="masterDataDropdown" role="button"
                                    data-bs-toggle="dropdown" aria-expanded="false">
                                    Master Data
                                </a>
                                <ul class="dropdown-menu border-0 shadow-sm" aria-labelledby="masterDataDropdown">
                                    <li><button class="dropdown-item nav-module-link"
                                            data-module="technicians-tab">Teknisi</button></li>
                                    <li><button class="dropdown-item nav-module-link"
                                            data-module="customers-tab">Pelanggan</button></li>
                                    <li><button class="dropdown-item nav-module-link"
                                            data-module="inventory-tab">Inventaris</button></li>
                                </ul>
                            </li>
                        </ul>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-link text-dark me-3 position-relative p-0" title="Notifikasi">
                                <i class="bi bi-bell fs-5"></i>
                                <span
                                    class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"
                                    style="display: none;" id="notif-dot">
                                    <span class="visually-hidden">New alerts</span>
                                </span>
                            </button>
                            <div class="dropdown">
                                <button
                                    class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center bg-light border-0 py-1"
                                    type="button" id="userProfileDropdown" data-bs-toggle="dropdown"
                                    aria-expanded="false">
                                    <i class="bi bi-person-circle me-2 fs-5"></i>
                                    <span id="user-display-email"
                                        class="small d-none d-md-inline">user@example.com</span>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm"
                                    aria-labelledby="userProfileDropdown">
                                    <li>
                                        <div class="dropdown-header" id="user-role-header">Role: ADMIN</div>
                                    </li>
                                    <li>
                                        <hr class="dropdown-divider">
                                    </li>
                                    <li><button class="dropdown-item text-danger" id="nav-logout-btn"><i
                                                class="bi bi-box-arrow-right me-2"></i>Keluar</button></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="container mt-4">
                <div id="user-info" class="alert alert-info shadow-sm mb-4 d-none"></div>

                <div id="role-feature">
                    <!-- Role-specific content will go here -->
                </div>

                <ul class="nav nav-tabs mt-4 d-none" id="masterDataTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="technicians-tab" data-bs-toggle="tab"
                            data-bs-target="#technicians-content" type="button" role="tab">Teknisi</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="customers-tab" data-bs-toggle="tab"
                            data-bs-target="#customers-content" type="button" role="tab">Pelanggan</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="inventory-tab" data-bs-toggle="tab"
                            data-bs-target="#inventory-content" type="button" role="tab">Inventaris</button>
                    </li>
                </ul>
                <div class="tab-content border-start border-end border-bottom p-4 bg-white rounded-bottom"
                    id="masterDataTabsContent">
                    <div class="tab-pane fade show active" id="technicians-content" role="tabpanel">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3>Teknisi</h3>
                            <button class="btn btn-sm btn-success" id="add-tech-btn">+ Tambah Teknisi</button>
                        </div>
                        <div id="technicians-list">Memuat...</div>
                    </div>
                    <div class="tab-pane fade" id="customers-content" role="tabpanel">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3>Pelanggan</h3>
                            <button class="btn btn-sm btn-success" id="add-customer-btn">+ Tambah Pelanggan</button>
                        </div>
                        <div id="customers-list">Memuat...</div>
                    </div>
                    <div class="tab-pane fade" id="inventory-content" role="tabpanel">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3>Inventaris</h3>
                            <button class="btn btn-sm btn-success" id="add-inventory-btn">+ Tambah Barang</button>
                        </div>
                        <div id="inventory-list">Memuat...</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Modal for CRUD operations (Shared) -->
        <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="crudModalTitle">Tambah/Edit Barang</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="crudModalBody">
                        <!-- Dynamic Form Content -->
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="button" class="btn btn-primary" id="save-crud-btn">Simpan Perubahan</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal for Map -->
        <div class="modal fade" id="mapModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Peta Lokasi</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <div id="admin-map" style="height: 400px; width: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Leaflet CSS & JS -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="/src/admin/admin.js"></script>
</body>

</html>
