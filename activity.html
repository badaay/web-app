<!DOCTYPE html>
<html lang="id" data-theme="ocean-teal">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiket Antrian - SiFatih</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.css">
    <link rel="stylesheet" href="/src/admin/admin.css">
    <link rel="stylesheet" href="/src/admin/themes.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #111827;
            color: #F9FAFB;
        }

        .chat-bubble {
            background-color: #1F2937;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #374151;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            font-size: 0.85rem;
            color: #9CA3AF;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .chat-title {
            font-weight: bold;
            color: #F9FAFB;
            margin-bottom: 0.25rem;
        }

        .chat-detail {
            font-size: 0.9rem;
            color: #D1D5DB;
        }

        .app-bar {
            background-color: rgba(31, 41, 55, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #374151;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #3B82F6;
        }

        .loading-chat {
            text-align: center;
            padding: 2rem;
            color: #9CA3AF;
        }

        .btn-eksekusi {
            width: 100%;
            margin-top: 0.75rem;
        }
    </style>
</head>

<body class="min-vh-100 d-flex flex-column">

    <!-- App Bar -->
    <div class="app-bar shadow-sm d-flex justify-content-between align-items-center">
        <div>
            <i class="bi bi-tools me-2"></i> Tiket Antrian
        </div>
        <div>
            <button id="btn-refresh" class="btn btn-sm btn-outline-primary rounded-circle me-2" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
            <button id="btn-install" class="btn btn-sm btn-outline-success rounded-circle d-none" title="Install App">
                <i class="bi bi-download"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow-1 p-3">
        <div class="container" style="max-width: 600px;">

            <div id="technician-info" class="text-center mb-4 d-none">
                <h5 id="tech-name" class="fw-bold mb-0">Nama Teknisi</h5>
                <span id="tech-id" class="badge bg-primary bg-opacity-10 text-primary mt-1">ID TKN</span>
            </div>

            <!-- Error Notification -->
            <div id="error-alert" class="alert alert-danger d-none shadow-sm rounded-4 border-danger mb-4 text-center">
                <i class="bi bi-exclamation-triangle-fill me-2 align-middle"></i>
                <span id="error-message">Terjadi kesalahan</span>
            </div>

            <div id="activity-chat-container">
                <div class="loading-chat">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Execution Modal -->
    <div class="modal fade" id="executionModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary">
                <div class="modal-header border-secondary text-white">
                    <h5 class="modal-title">Eksekusi Pekerjaan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body text-white">
                    <p>Apakah Anda sudah menyelesaikan pekerjaan ini?</p>
                    <div id="execution-form">
                        <div class="mb-3">
                            <label class="form-label text-white-50">Status Akhir</label>
                            <select class="form-select bg-dark border-secondary text-white" id="exec-status">
                                <option value="Selesai">Selesai</option>
                                <option value="Pending">Pending (Tunda)</option>
                                <option value="Kendala">Terdapat Kendala</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white-50">Keterangan Tambahan</label>
                            <textarea class="form-control bg-dark border-secondary text-white" id="exec-notes" rows="3"
                                placeholder="Tambahkan catatan..."></textarea>
                        </div>
                        
                        <hr class="border-secondary">
                        <h6 class="text-white fw-bold mb-3">Detail Pemasangan</h6>

                        <div class="mb-3">
                            <label class="form-label text-white-50">Upload Bukti Foto</label>
                            <input type="file" id="exec-photo" class="form-control bg-dark border-secondary text-white" accept="image/*">
                            <small class="text-white-50">Foto rumah/pemasangan terbaru</small>
                            <div id="photo-preview-container" class="mt-2 text-center d-none">
                                <img id="exec-photo-preview" src="" class="img-fluid rounded" style="max-height: 200px;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white-50">MAC Address</label>
                            <input type="text" id="exec-mac" class="form-control bg-dark border-secondary text-white" placeholder="00:00:00:00:00:00">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white-50">SN Modem</label>
                            <input type="text" id="exec-sn" class="form-control bg-dark border-secondary text-white" placeholder="Serial Number Modem">
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-white-50">Tgl Eksekusi</label>
                                <input type="date" id="exec-actual-date" class="form-control bg-dark border-secondary text-white">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-white-50">Tgl Aktivasi</label>
                                <input type="date" id="exec-activation-date" class="form-control bg-dark border-secondary text-white">
                            </div>
                        </div>

                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-primary" id="btn-save-exec">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/activity.js"></script>
</body>

</html>
