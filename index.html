<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Portal Pelanggan</title>
    <link rel="stylesheet" href="/src/styles.css">
    <meta name="theme-color" content="#ffffff">
</head>

<body>
    <div id="app" class="login-active">
        <div class="login-container">
            <div class="login-image-side"></div>
            <div class="login-form-side">
                <div class="login-box">
                    <div class="login-header">
                        <h1>Selamat datang kembali</h1>
                        <p>Gabung ke portal pelanggan.</p>
                    </div>
                    <div id="auth-section">
                        <input type="email" id="email" placeholder="Alamat Email" required>
                        <input type="password" id="password" placeholder="Kata Sandi" required>
                        <button id="login-btn">Masuk</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="dashboard-content" style="display: none; padding: 40px;">
            <h1>Dashboard Pelanggan</h1>
            <div id="map-container" style="height: 400px; width: 100%;"></div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
