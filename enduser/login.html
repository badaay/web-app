<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Portal Pelanggan</title>
    <link rel="stylesheet" href="/src/styles.css">
    <link rel="stylesheet" href="/src/customer/auth.css">
    <meta name="theme-color" content="#ffffff">
</head>

<body class="auth-page">
    <div id="app" class="login-active">
        <div class="customer-login-card">
            <div class="login-header">
                <h1>Selamat Datang</h1>
                <p>Silakan masuk ke akun pelanggan Anda</p>
            </div>
            <div id="auth-section">
                <input type="text" id="phone" class="auth-input" placeholder="Nomor HP" required>
                <input type="password" id="password" class="auth-input" placeholder="Kata Sandi" required>
                <button id="login-btn" class="auth-btn">Masuk</button>
            </div>
        </div>
        <div id="dashboard-content" style="display: none; padding: 40px;">
            <h1>Dashboard Pelanggan</h1>
            <div id="map-container" style="height: 400px; width: 100%;"></div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
