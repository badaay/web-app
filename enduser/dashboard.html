<!DOCTYPE html>
<html lang="id" data-theme="modern-slate">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiFatih - Dashboard Pelanggan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/src/styles.css">
    <link rel="stylesheet" href="/src/enduser/dashboard-premium.css">
</head>

<body class="dashboard-page">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="chat-container">
        <div class="premium-header">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h4 class="mb-0 fw-bold">Halo, <span id="user-name">Pelanggan</span></h4>
                <button id="logout-btn" class="btn btn-sm rounded-circle shadow-sm" title="Keluar">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
            <p class="mb-0 small" style="color: var(--dash-muted);">ID: <span id="customer-id" class="fw-medium">CUST-000</span></p>
            <div class="mitraflow-pill">Powered by MitraFlow</div>
        </div>


        <div id="main-content">
            <div id="loading-spinner" class="text-center py-5">
                <div class="spinner-border" style="color: var(--vscode-accent);" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-view="home">
            <i class="bi bi-house-door"></i>
            <span>Beranda</span>
        </a>
        <a href="#" class="nav-item" data-view="status">
            <i class="bi bi-truck"></i>
            <span>Tracking</span>
        </a>
        <a href="#" class="nav-item" data-view="paket">
            <i class="bi bi-box-seam"></i>
            <span>Paket</span>
        </a>
        <a href="#" class="nav-item" data-view="billing">
            <i class="bi bi-wallet2"></i>
            <span>Tagihan</span>
        </a>
    </nav>


    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="infoModalTitle">Detail</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="infoModalBody" style="color: var(--vscode-text);">
                    </div>
            </div>
        </div>
    </div>

    <div id="pwa-install-banner" class="pwa-install-banner d-none" role="dialog" aria-modal="true" aria-label="Install Aplikasi Required">
        <div class="pwa-banner-inner">
            <div class="pwa-banner-icon">
                <i class="bi bi-app-indicator fs-1"></i>
            </div>
            <div class="pwa-banner-copy">
                <div class="title">Wajib Install Aplikasi</div>
                <div class="sub" data-pwa-android>Silakan install aplikasi SiFatih untuk melanjutkan dan mendapatkan pengalaman terbaik.</div>
                <div class="sub d-none" data-pwa-ios>
                    Tap ikon <i class="bi bi-box-arrow-up mx-1"></i> di browser Anda, lalu pilih <br><strong class="text-bright">"Add to Home Screen"</strong> untuk menginstall.
                </div>
            </div>
            <div class="pwa-banner-btns">
                <button class="fw-bold shadow-sm" data-pwa-install>
                    <i class="bi bi-download me-2"></i>Install Sekarang
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/enduser/dashboard-chat.js"></script>
</body>

</html>
